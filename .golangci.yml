version: "2"

run:
  timeout: 5m
  go: '1.25'

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/linder3hs/cleanmac

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
